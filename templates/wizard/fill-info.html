<div class="card p-4 shadow-sm mt-4">
    <h3 class="text-primary-800 fw-bold mb-4">Application Details</h3>
    <form name="infoForm" class="aegov-form-control">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Full Name (English)</label>
                <input type="text" class="form-control" ng-model="applicant.fullNameEn" placeholder="Enter Full Name" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Passport Number</label>
                <input type="text" class="form-control" ng-model="applicant.passportNumber" placeholder="Enter Passport Number" required>
            </div>
        </div>
        <div class="row">
            <div class="col-md-12 mb-3">
                <label class="form-label">Nomination Category</label>
                <select class="form-control" ng-model="applicant.category" required>
                    <option value="">-- Select Category --</option>
                    <option value="1">Outstanding Specialized Talents</option>
                    <option value="2">Investors in Public Investments</option>
                    <option value="3">Real Estate Investors</option>
                </select>
            </div>
        </div>
        <div class="d-flex justify-content-end mt-4">
            <button type="button" class="btn btn-primary bg-gd-horizontal px-5" ng-disabled="infoForm.$invalid" ng-click="nextStep()">
                Next: Attachments
            </button>
        </div>
    </form>
</div>
